services:
  myfit:
    image: myfit:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myfit-app
    env_file:
      - .env.local
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
    volumes:
      # Persistir uploads entre reinicializações do container
      - uploads_volume:/app/public/uploads
    restart: unless-stopped
    networks:
      - myfit-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  uploads_volume:
    driver: local

networks:
  myfit-network:
    driver: bridge
